<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Доступ запрещён</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page" style="display:flex;flex-direction:column;justify-content:center;min-height:100vh;text-align:center;">
    <div style="font-size:80px;margin-bottom:16px;">🚫</div>
    <div style="font-family:var(--font-display);font-size:48px;color:var(--red);letter-spacing:3px;">ДОСТУП</div>
    <div style="font-family:var(--font-display);font-size:48px;color:var(--red);letter-spacing:3px;margin-bottom:16px;">ЗАПРЕЩЁН</div>
    <p class="text-muted" style="margin-bottom:32px;">У вас нет прав для просмотра этой страницы.<br>Обратитесь к ответственному администратору.</p>
    <button class="btn btn-secondary" onclick="logout()" style="max-width:280px;margin:0 auto;">
      ← Вернуться на вход
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>

</html>
